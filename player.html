<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Moonlight | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100vh; width: 100vw; background: #000; font-family: 'Syncopate', sans-serif; overflow: hidden; }

        /* The UI Header */
        header {
            height: 45px; background: #000; border-bottom: 1px solid #222;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: relative; z-index: 100;
        }

        .status { color: #444; font-size: 8px; letter-spacing: 2px; }
        .back-btn {
            color: #fff; font-size: 9px; letter-spacing: 1px; cursor: pointer;
            border: 1px solid #fff; padding: 5px 12px; transition: 0.2s;
        }
        .back-btn:hover { background: #fff; color: #000; }

        /* Game Iframe */
        #game-view { width: 100%; height: calc(100vh - 45px); border: none; background: #000; }

        /* Floating Panic Message */
        #panic-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8); color: white; padding: 10px 20px;
            font-size: 10px; border-radius: 4px; z-index: 9999;
            letter-spacing: 1px; pointer-events: none;
            opacity: 0; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <header>
        <div class="status" id="proc">EXEC // SYSTEM_INIT</div>
        <div class="back-btn" onclick="exit()">[ TERMINATE_SESSION ]</div>
    </header>

    <div id="panic-toast">PRESS "\" TO TERMINATE SESSION IMMEDIATELY</div>
    
    <iframe id="game-view" src="about:blank"></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        let gameUrl = params.get('game');

        // 1. Initialize Game
        if (gameUrl) {
            if (gameUrl.startsWith('/')) gameUrl = gameUrl.substring(1);
            document.getElementById('game-view').src = gameUrl;
            document.getElementById('proc').innerText = `PROCESS // ${gameUrl.split('/').pop().toUpperCase()}`;
            
            // Show the panic key toast for 5 seconds
            const toast = document.getElementById('panic-toast');
            setTimeout(() => { toast.style.opacity = '1'; }, 1000);
            setTimeout(() => { toast.style.opacity = '0'; }, 6000);
        }

        // 2. The Exit Logic
        function exit() {
            window.location.href = 'games.html';
        }

        // 3. THE PANIC KEY ( \ )
        // Note: This works when the HEADER is focused. 
        // If the game iframe is focused, most browsers block the parent from seeing keys.
        window.addEventListener('keydown', (e) => {
            if (e.key === '\\') { // This is the backslash key
                exit();
            }
        });

        // 4. Focus Fix
        // Periodically try to pull focus back to the parent so the "\" key works
        // (Warning: This can mess up some typing games, use cautiously)
        /* setInterval(() => {
            if (document.activeElement.tagName === "IFRAME") {
                // We don't force focus, but we stay alert
            }
        }, 1000); 
        */
    </script>
</body>
</html>
